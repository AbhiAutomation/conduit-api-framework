name: Cypress API Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  api-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Verify Cypress
        run: npx cypress verify

      - name: Run API Tests
        run: npx cypress run

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-report
          path: |
            cypress/reports
            mochawesome-report
